<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水劑表示牌製作產生器｜仁愛院區</title>
<style>
:root{--bg:#f3f3ef;--panel:#fff;--ink:#16140f;--muted:#8f8f86;--line:#e3e3dc;--soft:#f7f7f3;--red:#d5202a;}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1160px;margin:0 auto;padding:26px 20px 64px}
header.top{display:flex;align-items:center;gap:14px;padding-bottom:18px;border-bottom:1.6px solid var(--ink);margin-bottom:22px}
.brandmark{width:42px;height:42px;flex:0 0 auto}.brandmark svg{display:block;width:100%;height:100%}
.eyebrow{font-size:10.5px;color:var(--muted);letter-spacing:4px;font-weight:600;margin-bottom:3px}
h1{font-size:21px;margin:0;letter-spacing:2px;font-weight:800}
.tabs{display:flex;margin-bottom:22px;border:1.4px solid var(--ink);border-radius:8px;width:max-content;overflow:hidden}
.tab{appearance:none;border:none;background:#fff;color:var(--ink);font:inherit;font-weight:700;font-size:14px;padding:9px 26px;cursor:pointer;transition:.12s}
.tab+.tab{border-left:1.4px solid var(--ink)}
.tab[aria-selected="true"]{background:var(--ink);color:#fff}
.tab:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.grid{display:grid;grid-template-columns:370px 1fr;gap:24px;align-items:start}
@media(max-width:880px){.grid{grid-template-columns:1fr}}
.card{background:var(--panel);border:1.4px solid var(--line);border-radius:10px;padding:20px}
.card h2{font-size:11px;letter-spacing:3px;color:var(--muted);margin:0 0 16px;font-weight:700;text-transform:uppercase}
.field{margin-bottom:15px}
.field>label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;letter-spacing:1px}
input[type=text]{width:100%;font:inherit;font-size:15px;padding:10px 12px;border:1.4px solid var(--line);border-radius:7px;background:#fff;color:var(--ink)}
input:focus{outline:none;border-color:var(--ink)}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sublbl{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:1px}
.note{font-size:11.5px;color:var(--muted);margin-top:-4px;margin-bottom:15px;line-height:1.5}
.ghs-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ghs-opt{position:relative;display:flex;flex-direction:column;align-items:center;gap:5px;border:1.4px solid var(--line);border-radius:8px;padding:9px 4px 7px;cursor:pointer;background:#fff;transition:.12s}
.ghs-opt svg{width:40px;height:40px}.ghs-opt span{font-size:11px;color:var(--muted);line-height:1.15;text-align:center}
.ghs-opt.on{border-color:var(--ink);background:var(--soft)}
.ghs-opt input{position:absolute;opacity:0;width:0;height:0}
.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:6px}
.btn{appearance:none;border:1.4px solid var(--ink);font:inherit;font-weight:700;font-size:14px;padding:11px 16px;border-radius:7px;cursor:pointer;transition:.12s}
.btn.primary{background:var(--ink);color:#fff}.btn.primary:hover{background:#000}
.btn.ghost{background:#fff;color:var(--ink)}.btn.ghost:hover{background:var(--soft)}
.btn.danger{background:#fff;color:var(--red);border-color:#eccac8}
.btn:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.stage-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stage-head .tip{font-size:11.5px;color:var(--muted);letter-spacing:1px}
.pv-stage{background:#e9e9e3;border:1.4px solid var(--line);border-radius:10px;padding:22px}
.label-wrap{box-shadow:0 10px 30px -18px rgba(0,0,0,.4)}.label-wrap svg{width:100%;height:auto;display:block}
textarea.bulk-in{width:100%;min-height:76px;font:inherit;font-size:13.5px;padding:10px 12px;border:1.4px solid var(--line);border-radius:7px;background:#fff;resize:vertical;color:var(--ink)}
textarea.bulk-in:focus{outline:none;border-color:var(--ink)}
.list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.count-pill{background:var(--ink);color:#fff;font-size:12px;font-weight:800;padding:3px 11px;border-radius:999px}
.row-card{display:flex;align-items:center;gap:12px;border:1.4px solid var(--line);border-radius:8px;padding:9px;margin-bottom:10px;background:#fff}
.row-thumb{flex:0 0 250px;border-radius:4px;overflow:hidden;border:1px solid var(--line)}.row-thumb svg{width:100%;height:auto;display:block}
.row-meta{flex:1;min-width:0}.row-meta .nm{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-meta .dt{font-size:12px;color:var(--muted);margin-top:3px}
.row-del{flex:0 0 auto;border:1.4px solid #eccac8;background:#fff;color:var(--red);border-radius:7px;width:34px;height:34px;cursor:pointer;font-size:18px}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:28px 10px;border:1.4px dashed var(--line);border-radius:8px;background:var(--soft)}
footer.foot{margin-top:34px;text-align:center;color:var(--muted);font-size:11.5px;letter-spacing:2px}
#printRoot{position:absolute;left:0;top:0;width:100%}
@media screen{#printRoot{display:none}}
.print-page{display:flex;flex-direction:column;gap:6mm;align-items:center;page-break-after:always}
.print-page:last-child{page-break-after:auto}
.plabel{width:194mm}.plabel svg{width:194mm;height:auto;display:block}
@media print{body{background:#fff}body>*:not(#printRoot){display:none!important}#printRoot{display:block}@page{size:A4 portrait;margin:9mm}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <span class="brandmark" id="brandmark"></span>
    <div><div class="eyebrow">藥劑安全標示　／　HAZARDOUS MATERIAL</div><h1>水劑表示牌製作產生器</h1></div>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab" id="tab-single" role="tab" aria-selected="true" onclick="switchTab('single')">單張製作</button>
    <button class="tab" id="tab-batch" role="tab" aria-selected="false" onclick="switchTab('batch')">批次製作</button>
  </div>

  <section id="panel-single" class="grid">
    <div class="card">
      <h2>填寫內容 — 單張</h2>
      <div class="field"><label for="s_name">水劑名稱</label><input type="text" id="s_name" value="克菌寧殺菌液 2%" oninput="renderSingle()"></div>
      <div class="field"><label>庫存設定量（固定列印）</label>
        <div class="twocol">
          <div><div class="sublbl">最大量 MAX</div><input type="text" id="s_max" value="20 瓶" oninput="renderSingle()"></div>
          <div><div class="sublbl">最小量 MIN</div><input type="text" id="s_min" value="5 瓶" oninput="renderSingle()"></div>
        </div>
      </div>
      <div class="note">到期日期不印在表上，採數字方格留白——護貝後以白板筆／油性筆填寫，可重複擦寫換新。</div>
      <div class="field"><label>危害分類標誌</label><div class="ghs-pick" id="ghsSingle"></div></div>
      <div class="actions">
        <button class="btn primary" onclick="printOne(false)">列印這張</button>
        <button class="btn ghost" onclick="printOne(true)">列印整頁 4 張</button>
        <button class="btn ghost" onclick="pushToBatch()">＋ 加入批次</button>
      </div>
    </div>
    <div class="card">
      <div class="stage-head"><h2 style="margin:0">即時預覽</h2><span class="tip">A4 原寸列印・每頁 4 張</span></div>
      <div class="pv-stage"><div class="label-wrap" id="pvLabel"></div></div>
    </div>
  </section>

  <section id="panel-batch" class="grid" style="display:none">
    <div class="card">
      <h2>新增到清單 — 批次</h2>
      <div class="field"><label for="b_name">水劑名稱</label><input type="text" id="b_name" placeholder="例：75% 酒精性乾洗手液"></div>
      <div class="field"><label>庫存設定量</label>
        <div class="twocol">
          <div><div class="sublbl">最大量 MAX</div><input type="text" id="b_max" placeholder="20 瓶"></div>
          <div><div class="sublbl">最小量 MIN</div><input type="text" id="b_min" placeholder="5 瓶"></div>
        </div>
      </div>
      <div class="field"><label>危害分類標誌（套用此筆與批次貼上）</label><div class="ghs-pick" id="ghsBatch"></div></div>
      <div class="actions"><button class="btn primary" onclick="addBatchRow()">＋ 新增到清單</button></div>
      <div style="margin-top:18px">
        <div class="field" style="margin-bottom:8px"><label for="b_bulk">批次貼上（一行一筆，格式：名稱，最大量，最小量）</label>
          <textarea class="bulk-in" id="b_bulk" placeholder="克菌寧殺菌液 2%，20，5&#10;75% 酒精，12，3&#10;次氯酸鈉稀釋液，8，2"></textarea></div>
        <button class="btn ghost" onclick="bulkImport()">批次匯入</button>
      </div>
    </div>
    <div class="card">
      <div class="list-head"><h2 style="margin:0">列印清單 <span class="count-pill" id="bCount">0</span></h2>
        <div style="display:flex;gap:8px"><button class="btn primary" onclick="printBatch()">列印全部</button><button class="btn danger" onclick="clearBatch()">清空</button></div></div>
      <div id="batchList"></div>
    </div>
  </section>

  <footer class="foot">© 鄭瑞賢 製作・版權所有</footer>
</div>
<div id="printRoot"></div>

<script>
var INK="#16140f",GRAY="#8f8f86",RED="#d5202a";

 '<g fill="#0a6135"><rect x="18" y="6" width="29" height="121" rx="14.5"/>'+

 excl:{zh:'刺激／警告',sym:'<path fill="#1a1a1a" d="M46 32 h8 l-2 24 h-4 z"/><circle cx="50" cy="63" r="4.2" fill="#1a1a1a"/>'},

 gas:{zh:'壓縮氣體',sym:'<g transform="rotate(-32 50 52)"><rect x="44" y="30" width="12" height="40" rx="6" fill="#1a1a1a"/><rect x="47.5" y="24" width="5" height="8" rx="1.5" fill="#1a1a1a"/></g>'},

function ghsInner(k){return GHS_FRAME+GHS[k].sym;}
function ghsIcon(k){return '<svg viewBox="0 0 100 100" width="40" height="40" xmlns="http://www.w3.org/2000/svg">'+ghsInner(k)+'</svg>';}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function cjkW(s){var w=0;for(var i=0;i<s.length;i++)w+=/[\u0000-\u00ff]/.test(s[i])?0.56:1;return w;}
function fitFont(s,b,base,mn){var w=cjkW(s)||1;return Math.max(mn,Math.min(base,b/w));}

var GF="'Noto Sans TC','Microsoft JhengHei','Heiti TC',sans-serif";

  var bx=112,i;

  s+='<text x="'+(bx+1)+'" y="227" font-size="20" font-weight="700" fill="'+INK+'">日</text>';
  /* right: 最大量 / 最小量 (printed) */

  s+='<text x="676" y="232" font-size="'+maxFs+'" font-weight="800" fill="'+INK+'">'+esc(d.max||'')+'</text>';
  s+='<text x="830" y="180" font-size="11" font-weight="600" fill="'+GRAY+'" letter-spacing="2">最小量　MIN</text>';
  s+='<text x="830" y="232" font-size="'+minFs+'" font-weight="800" fill="'+INK+'">'+esc(d.min||'')+'</text>';
  /* bottom */
  s+='<line x1="46" y1="270" x2="954" y2="270" stroke="'+INK+'" stroke-width="1.6"/>';
  var gx=46;
  (d.ghs||[]).forEach(function(k){ if(GHS[k]){ s+='<svg x="'+gx+'" y="272" width="48" height="48" viewBox="0 0 100 100">'+ghsInner(k)+'</svg>'; gx+=54; } });
  s+='<text x="954" y="304" text-anchor="end" font-size="20" font-weight="800" fill="'+RED+'" letter-spacing="6">嚴禁煙火</text>';
  s+='</svg>';
  return s;
}

function renderGhsPicker(id,sel){
  var c=document.getElementById(id);c.innerHTML='';
  GHS_ORDER.forEach(function(k){
    var on=sel.indexOf(k)>=0,lab=document.createElement('label');
    lab.className='ghs-opt'+(on?' on':'');
    lab.innerHTML=ghsIcon(k)+'<span>'+GHS[k].zh+'</span><input type="checkbox" value="'+k+'" '+(on?'checked':'')+'>';
    var inp=lab.querySelector('input');
    inp.addEventListener('change',function(){lab.classList.toggle('on',inp.checked);if(id==='ghsSingle')renderSingle();});
    c.appendChild(lab);
  });
}
function getGhs(id){var o=[];document.querySelectorAll('#'+id+' input:checked').forEach(function(i){o.push(i.value);});return o;}

function readSingle(){return{name:s_name.value.trim(),max:s_max.value.trim(),min:s_min.value.trim(),ghs:getGhs('ghsSingle')};}
function renderSingle(){document.getElementById('pvLabel').innerHTML=buildLabel(readSingle());}

function chunk(a,n){var o=[];for(var i=0;i<a.length;i+=n)o.push(a.slice(i,i+n));return o;}
function doPrint(list){if(!list.length){alert('清單沒有資料');return;}var html='';
  chunk(list,4).forEach(function(pg){html+='<div class="print-page">';pg.forEach(function(d){html+='<div class="plabel">'+buildLabel(d)+'</div>';});html+='</div>';});
  document.getElementById('printRoot').innerHTML=html;window.print();}
function printOne(fill){var d=readSingle();doPrint(fill?[d,d,d,d]:[d]);}

var rows=[];
function readBatchForm(){return{name:b_name.value.trim(),max:b_max.value.trim(),min:b_min.value.trim(),ghs:getGhs('ghsBatch')};}
function addBatchRow(){var d=readBatchForm();if(!d.name){alert('請先輸入水劑名稱');return;}rows.push(d);b_name.value='';b_max.value='';b_min.value='';b_name.focus();renderBatch();}
function bulkImport(){var L=b_bulk.value.split(/\n/),base=readBatchForm(),n=0;
  L.forEach(function(x){x=x.trim();if(!x)return;var p=x.split(/[,，\t]/);var nm=(p[0]||'').trim();if(!nm)return;
    rows.push({name:nm,max:(p[1]||'').trim(),min:(p[2]||'').trim(),ghs:base.ghs.slice()});n++;});
  if(!n){alert('沒有可匯入的資料');return;}b_bulk.value='';renderBatch();}
function pushToBatch(){var d=readSingle();if(!d.name){alert('請先輸入水劑名稱');return;}rows.push(d);renderBatch();alert('已加入批次清單（目前 '+rows.length+' 筆）');}
function delRow(i){rows.splice(i,1);renderBatch();}
function clearBatch(){if(rows.length&&confirm('確定清空清單？')){rows=[];renderBatch();}}
function renderBatch(){
  document.getElementById('bCount').textContent=rows.length;
  var list=document.getElementById('batchList');
  if(!rows.length){list.innerHTML='<div class="empty">清單目前是空的。<br>用上方表單新增，或「批次貼上」一次匯入多筆。</div>';return;}
  list.innerHTML=rows.map(function(d,i){
    return '<div class="row-card"><div class="row-thumb">'+buildLabel(d)+'</div>'+
      '<div class="row-meta"><div class="nm">'+esc(d.name)+'</div>'+
      '<div class="dt">最大量 '+esc(d.max||'—')+'／最小量 '+esc(d.min||'—')+'　·　到期日期留空手寫</div></div>'+
      '<button class="row-del" title="刪除" onclick="delRow('+i+')">×</button></div>';
  }).join('');
}
function printBatch(){doPrint(rows);}

function switchTab(w){var s=w==='single';
  document.getElementById('panel-single').style.display=s?'grid':'none';
  document.getElementById('panel-batch').style.display=s?'none':'grid';
  document.getElementById('tab-single').setAttribute('aria-selected',s);
  document.getElementById('tab-batch').setAttribute('aria-selected',!s);}

var s_name,s_max,s_min,b_name,b_max,b_min,b_bulk;
function bindRefs(){['s_name','s_max','s_min','b_name','b_max','b_min','b_bulk'].forEach(function(id){window[id]=document.getElementById(id);});}

bindRefs();
document.getElementById('brandmark').innerHTML=logoSVG();
renderGhsPicker('ghsSingle',['flame','excl']);
renderGhsPicker('ghsBatch',['flame','excl']);
renderSingle();renderBatch();
</script>
</body>
</html>
